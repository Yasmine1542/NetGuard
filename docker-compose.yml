# NetGuard — local full-stack run.
#   docker compose up --build
# Then open http://localhost:8080
#
# Secrets come from the environment / .env (see .env.example). The only secret
# the stack needs to do AIOps is GROQ_API_KEY; everything else has a dev default.

name: netguard

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiops}   # local dev default; override in real env
      POSTGRES_DB: aiops
    volumes:
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops"]
      interval: 5s
      timeout: 3s
      retries: 5

  inference:
    # Built from the demo-app/ context so the model is baked into the image.
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    environment:
      INFERENCE_MODEL_DIR: /models

  collector:
    build: ./services/collector
    depends_on:
      redis:
        condition: service_healthy
      inference:
        condition: service_started

  backend-api:
    build: ./services/backend-api
    depends_on:
      redis:
        condition: service_healthy
      inference:
        condition: service_started
      aiops-engine:
        condition: service_started

  aiops-engine:
    build: ./services/aiops-engine
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AIOPS_DB_URL: postgresql://aiops:${POSTGRES_PASSWORD:-aiops}@postgres:5432/aiops
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      LOKI_URL: ${LOKI_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend-api:
        condition: service_started
      collector:
        condition: service_started
      aiops-engine:
        condition: service_started

volumes:
  pgdata:
