# ArgoCD Application that deploys NetGuard from git (GitOps CD).
#
# Set repoURL to wherever the clean NetGuard repo lives. `path` assumes that repo
# has demo-app/ as its root (so the manifests are at k8s/); if you deploy from the
# monorepo instead, set path: demo-app/k8s.
#
# directory.recurse: false keeps k8s/rollouts/ OUT of GitOps — the inference
# canary is applied manually as a deliberate progressive-delivery demo.
#
# Per the project convention, automated sync runs with selfHeal AND prune OFF, so
# nothing auto-reverts manual/Ansible changes; sync is effectively deliberate.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netguard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: REPO_URL_PLACEHOLDER
    targetRevision: main
    path: k8s
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: netguard
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: false
      selfHeal: false
