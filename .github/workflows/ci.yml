name: CI

# Per-service: lint + test -> hadolint -> build -> Trivy scan -> push to GHCR.
# Runs free on public-repo GitHub-hosted runners. Pushes images to
# ghcr.io/<owner>/netguard-<service> using the built-in GITHUB_TOKEN (no PAT).
# PRs run everything except the push.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: inference,    context: ".",                   file: services/inference/Dockerfile,     lang: python }
          - { service: collector,    context: services/collector,    file: services/collector/Dockerfile,     lang: python }
          - { service: backend-api,  context: services/backend-api,  file: services/backend-api/Dockerfile,   lang: python }
          - { service: aiops-engine, context: services/aiops-engine, file: services/aiops-engine/Dockerfile,  lang: python }
          - { service: frontend,     context: frontend,              file: frontend/Dockerfile,               lang: docker }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: Lint + unit tests
        if: matrix.lang == 'python'
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements-dev.txt
          ruff check .
          pytest -q

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.file }}
          failure-threshold: error

      - name: Image name (lowercased owner)
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/netguard-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          load: true
          tags: ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ steps.meta.outputs.image }}:${{ github.sha }} ${{ steps.meta.outputs.image }}:latest
          docker push ${{ steps.meta.outputs.image }}:${{ github.sha }}
          docker push ${{ steps.meta.outputs.image }}:latest
