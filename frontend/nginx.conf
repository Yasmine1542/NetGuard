server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Edge routing ──────────────────────────────────────────────────────────
    # The frontend nginx is the single entry point. It fans API/WS paths out to
    # the backend microservices by their service name (same short DNS works in
    # docker-compose and in-cluster). Longest-prefix match wins, so the specific
    # /api/aiops, /api/incidents, /api/inject routes take precedence over /api/.

    # AIOps engine: incidents + diagnosis (REST and the live agent-step WS).
    location /api/aiops/ {
        proxy_pass http://aiops-engine:8000;
    }
    location /api/incidents {
        proxy_pass http://aiops-engine:8000;
    }
    location /ws/aiops/ {
        proxy_pass http://aiops-engine:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Collector: attack injection (demo control).
    location /api/inject {
        proxy_pass http://collector:8000;
    }

    # backend-api: everything else under /api plus the live prediction stream.
    location /api/ {
        proxy_pass http://backend-api:8000;
    }
    location /ws {
        proxy_pass http://backend-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Static SPA ────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
