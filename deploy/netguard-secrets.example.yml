# Template for the netguard-secrets Secret. This is NOT applied by ArgoCD.
# Copy it, fill in REAL values, and create the Secret out-of-band:
#
#   cp netguard-secrets.example.yml /tmp/netguard-secrets.yml
#   # edit /tmp/netguard-secrets.yml with real values
#   kubectl apply -f /tmp/netguard-secrets.yml
#
# Or create it imperatively (preferred — nothing on disk):
#   kubectl -n netguard create secret generic netguard-secrets \
#     --from-literal=GROQ_API_KEY='gsk_...' \
#     --from-literal=POSTGRES_PASSWORD='<pw>' \
#     --from-literal=AIOPS_DB_URL='postgresql://aiops:<pw>@postgres:5432/aiops'
apiVersion: v1
kind: Secret
metadata:
  name: netguard-secrets
  namespace: netguard
type: Opaque
stringData:
  GROQ_API_KEY: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  AIOPS_DB_URL: "postgresql://aiops:REPLACE_ME@postgres:5432/aiops"
  # Shared secret the Alertmanager webhook must present (Authorization: Bearer).
  AIOPS_WEBHOOK_TOKEN: "REPLACE_ME"
