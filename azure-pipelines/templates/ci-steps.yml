# Reusable CI steps for one NetGuard service: build -> Trivy scan -> push.
# The scan runs on the freshly built LOCAL image BEFORE push, so a HIGH/CRITICAL
# CVE fails the run and never reaches the registry.
#
# Runs on the self-hosted agent (pool netguard-xpertos), which has Docker and
# Trivy pre-installed. The image is built inside its Dockerfile, so no host-side
# Python/Node toolchain is needed here.
#
# Registry-agnostic via the "netguard-registry" variable group:
#   registryConnection   Docker Registry service connection name (acr-connection)
#   registryHost         registry host, e.g. netguardacr.azurecr.io
#   imageRepoPrefix      repository prefix, e.g. "netguard-"
parameters:
  - name: name          # service name (inference, collector, ...)
    type: string
  - name: context       # docker build context
    type: string
  - name: dockerfile    # path to the Dockerfile
    type: string
  - name: kind          # python | frontend  (kept for compatibility; unused here)
    type: string
    default: python

steps:
  - task: Docker@2
    displayName: Build image
    inputs:
      command: build
      containerRegistry: $(registryConnection)
      repository: $(imageRepoPrefix)${{ parameters.name }}
      dockerfile: ${{ parameters.dockerfile }}
      buildContext: ${{ parameters.context }}
      tags: |
        $(Build.BuildId)
        latest

  - script: |
      trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 \
        $(registryHost)/$(imageRepoPrefix)${{ parameters.name }}:$(Build.BuildId)
    displayName: Trivy image scan (fail on HIGH/CRITICAL)

  - task: Docker@2
    displayName: Push image
    inputs:
      command: push
      containerRegistry: $(registryConnection)
      repository: $(imageRepoPrefix)${{ parameters.name }}
      tags: |
        $(Build.BuildId)
        latest
