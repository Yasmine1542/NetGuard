trigger:
  branches:
    include: [main]
  paths:
    include:
      - services/backend-api/**
pool:
  name: netguard-xpertos
variables:
  - group: netguard-registry
steps:
  - template: templates/ci-steps.yml
    parameters:
      name: backend-api
      context: services/backend-api
      dockerfile: services/backend-api/Dockerfile
      kind: python
