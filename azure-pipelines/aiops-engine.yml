trigger:
  branches:
    include: [main]
  paths:
    include:
      - services/aiops-engine/**
pool:
  name: netguard-xpertos
variables:
  - group: netguard-registry
steps:
  - template: templates/ci-steps.yml
    parameters:
      name: aiops-engine
      context: services/aiops-engine
      dockerfile: services/aiops-engine/Dockerfile
      kind: python
