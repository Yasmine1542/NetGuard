# ClusterSecretStore: teaches External Secrets Operator how to reach Azure Key Vault.
# Auth is a Service Principal (on-prem cluster can't use Managed Identity), whose
# client id/secret live in the bootstrap Secret azure-kv-creds (created manually,
# never in Git). Fill in <vault-url> and <tenant-id> from the Portal.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: ServicePrincipal
      vaultUrl: "https://<your-vault-name>.vault.azure.net"
      tenantId: "<your-tenant-id>"
      authSecretRef:
        clientId:
          name: azure-kv-creds
          namespace: netguard
          key: client-id
        clientSecret:
          name: azure-kv-creds
          namespace: netguard
          key: client-secret
