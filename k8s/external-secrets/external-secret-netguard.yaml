# ExternalSecret: ESO pulls these from Key Vault and materialises the K8s Secret
# netguard-secrets that aiops-engine consumes via envFrom. ESO owns the Secret and
# refreshes it hourly, so rotating a value in Key Vault propagates to the cluster.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netguard-secrets
  namespace: netguard
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: netguard-secrets        # the exact Secret aiops-engine reads
    creationPolicy: Owner
  data:
    - secretKey: GROQ_API_KEY      # key inside the K8s Secret
      remoteRef:
        key: groq-api-key          # secret name in Key Vault
    - secretKey: AIOPS_DB_URL
      remoteRef:
        key: aiops-db-url
