# backend-api — dashboard gateway. Subscribes to the Redis bus for the live /ws
# stream, serves metrics/live-stats/status, proxies Prometheus & Loki.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: netguard
  labels: { app: backend-api, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend-api }
  template:
    metadata:
      labels: { app: backend-api }
    spec:
      serviceAccountName: netguard-app
      imagePullSecrets: [{ name: registry-secret }]
      containers:
        - name: backend-api
          image: netguardacr.azurecr.io/netguard-backend-api:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: netguard-config }
          ports:
            - { containerPort: 8000, name: http, protocol: TCP }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: netguard
spec:
  selector: { app: backend-api }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
