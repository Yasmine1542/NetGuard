# Canary gate: queried by the inference Rollout (20-inference.yml) between traffic
# steps. The canary is promoted only while the new version keeps the model loaded
# and latency low; otherwise Argo Rollouts auto-rolls-back to the stable version —
# a concrete instance of "failure observed as a signal -> reconcile to a
# known-good state".
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: inference-health
  namespace: netguard
spec:
  metrics:
    - name: model-loaded
      interval: 20s
      count: 3
      failureLimit: 1
      successCondition: "result[0] >= 1"
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc.cluster.local:9090
          query: min(netguard_model_loaded{namespace="netguard"})
    - name: p95-latency-seconds
      interval: 20s
      count: 3
      failureLimit: 1
      # Tolerates "no data yet" (NaN) by only failing on a real high value.
      successCondition: "isNaN(result[0]) || result[0] < 0.1"
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc.cluster.local:9090
          query: >
            histogram_quantile(0.95,
              sum(rate(netguard_inference_latency_seconds_bucket{namespace="netguard"}[2m])) by (le))
