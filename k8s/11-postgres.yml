# PostgreSQL for incident history. Single small Longhorn PVC (the only stateful
# new component). The incidents table is created by the mounted init script.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netguard-postgres-init
  namespace: netguard
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS incidents (
        id              TEXT PRIMARY KEY,
        triggered_at    TIMESTAMPTZ,
        trigger_source  TEXT,
        trigger_raw     JSONB,
        status          TEXT,
        severity        TEXT,
        failure_mode    TEXT,
        namespace       TEXT,
        affected_pods   JSONB,
        root_cause      TEXT,
        confidence      DOUBLE PRECISION,
        triage_output   JSONB,
        evidence_output JSONB,
        rca_output      JSONB,
        postmortem      JSONB,
        duration_s      DOUBLE PRECISION,
        resolved_at     TIMESTAMPTZ
    );
    CREATE INDEX IF NOT EXISTS incidents_triggered_at_idx ON incidents (triggered_at DESC);
    CREATE INDEX IF NOT EXISTS incidents_status_idx ON incidents (status);
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: netguard
  labels: { app: postgres, app.kubernetes.io/part-of: netguard }
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - configMapRef: { name: netguard-config }   # POSTGRES_USER, POSTGRES_DB
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: netguard-secrets, key: POSTGRES_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { containerPort: 5432, name: postgres, protocol: TCP }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "aiops"] }
            periodSeconds: 10
      volumes:
        - name: init
          configMap: { name: netguard-postgres-init }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests: { storage: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: netguard
spec:
  selector: { app: postgres }
  ports:
    - { name: postgres, port: 5432, targetPort: 5432 }
