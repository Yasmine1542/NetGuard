# Collector — replays NSL-KDD / synthetic flows, scores them via inference,
# publishes results to the Redis bus. Also serves POST /api/inject.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: netguard
  labels: { app: collector, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: collector }
  template:
    metadata:
      labels: { app: collector }
    spec:
      serviceAccountName: netguard-app
      imagePullSecrets: [{ name: registry-secret }]
      containers:
        - name: collector
          image: netguardacr.azurecr.io/netguard-collector:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: netguard-config }
          ports:
            - { containerPort: 8000, name: http, protocol: TCP }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: netguard
spec:
  selector: { app: collector }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
