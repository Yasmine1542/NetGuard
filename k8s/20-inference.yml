# Inference — LightGBM model serving. The model artifacts are baked into the
# image, so there is no runtime volume or external dependency.
#
# Deployed as an Argo Rollouts canary (not a plain Deployment): a new model = a
# new image tag, which shifts 50% of replicas to the candidate, pauses, then runs
# the inference-health AnalysisTemplate (25-inference-analysis.yml). It promotes
# to 100% only if the gate passes; otherwise it auto-rolls-back to the stable
# ReplicaSet — "failure observed as a signal -> reconcile to a known-good state".
#
# Requires the argo-rollouts controller (ansible playbooks/30-argo-rollouts.yml).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inference
  namespace: netguard
  labels: { app: inference, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels: { app: inference }
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 30 }
        - analysis:
            templates:
              - templateName: inference-health
        - setWeight: 100
  template:
    metadata:
      labels: { app: inference }
    spec:
      imagePullSecrets: [{ name: registry-secret }]
      containers:
        - name: inference
          image: ghcr.io/yasmine1542/netguard-inference:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: netguard-config }
          ports:
            - { containerPort: 8000, name: http, protocol: TCP }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: netguard
spec:
  selector: { app: inference }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
