# aiops-engine — incident diagnosis pipeline. Runs as the netguard-aiops SA
# (cluster reads) and needs GROQ_API_KEY + AIOPS_DB_URL from netguard-secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-engine
  namespace: netguard
  labels: { app: aiops-engine, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: aiops-engine }
  template:
    metadata:
      labels: { app: aiops-engine }
    spec:
      serviceAccountName: netguard-aiops
      imagePullSecrets: [{ name: registry-secret }]
      containers:
        - name: aiops-engine
          image: ghcr.io/yasmine1542/netguard-aiops-engine:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: netguard-config }
            - secretRef: { name: netguard-secrets }   # GROQ_API_KEY, AIOPS_DB_URL
          ports:
            - { containerPort: 8000, name: http, protocol: TCP }
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 500m, memory: 384Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-engine
  namespace: netguard
spec:
  selector: { app: aiops-engine }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
