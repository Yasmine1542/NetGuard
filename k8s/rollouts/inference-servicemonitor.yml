# Tells kube-prometheus-stack to scrape the inference /metrics endpoint.
# The `release` label is what the Prometheus Operator's serviceMonitorSelector
# matches by default.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inference
  namespace: netguard
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: ["netguard"]
  selector:
    matchLabels:
      app: inference
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
