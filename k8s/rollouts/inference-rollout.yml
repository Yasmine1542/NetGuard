# Progressive delivery for the inference service. Applying this Rollout SUPERSEDES
# the inference Deployment (k8s/20-inference.yml) — scale that Deployment to 0 (or
# delete it) first, since both use the same `app: inference` selector.
#
# A new model = a new image tag. The canary shifts 50% of replicas to it, pauses,
# then runs the inference-health analysis; it promotes to 100% only if the gate
# passes, otherwise it auto-rolls-back.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inference
  namespace: netguard
  labels: { app: inference, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels: { app: inference }
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 30 }
        - analysis:
            templates:
              - templateName: inference-health
        - setWeight: 100
  template:
    metadata:
      labels: { app: inference }
    spec:
      imagePullSecrets: [{ name: registry-secret }]
      containers:
        - name: inference
          image: REGISTRY_PLACEHOLDER/netguard-inference:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: netguard-config }
          ports:
            - { containerPort: 8000, name: http }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
