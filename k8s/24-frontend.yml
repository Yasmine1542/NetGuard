# Frontend — React SPA served by nginx, which also edge-routes /api and /ws to
# the backend services (see frontend/nginx.conf).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: netguard
  labels: { app: frontend, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      imagePullSecrets: [{ name: registry-secret }]
      containers:
        - name: frontend
          image: ghcr.io/yasmine1542/netguard-frontend:latest
          imagePullPolicy: Always
          ports:
            - { containerPort: 80, name: http }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 192Mi }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: netguard
spec:
  selector: { app: frontend }
  ports:
    - { name: http, port: 80, targetPort: 80 }
