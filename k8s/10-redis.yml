# Redis is the live prediction bus (pub/sub + capped recent buffer). The data is
# transient, so it runs without persistence — no Longhorn volume, no I/O on etcd.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: netguard
  labels: { app: redis, app.kubernetes.io/part-of: netguard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - { containerPort: 6379, name: redis, protocol: TCP }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: netguard
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
